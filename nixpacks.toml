[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libpangocairo-1.0-0",
  "libgdk-pixbuf2.0-0",
  "libffi-dev",
  "shared-mime-info",
  "libcairo2",
  "libgobject-2.0-0",
  "libharfbuzz0b",
  "fonts-dejavu-core"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "pip install pip-audit==2.10.0"
]

[phases.build]
cmds = [
  "pip-audit -r requirements.txt",
  "python manage.py collectstatic --no-input",
  "python manage.py migrate",
  "python manage.py seed_initial_data"
]

# Start-Kommando kommt aus Procfile (JSON exec-form via Procfile vermeidet
# Docker-Warnung JSONArgsRecommended und stellt sicher dass SIGTERM
# direkt an Gunicorn geht -> sauberes Graceful Shutdown)