<div class="border rounded p-3 mb-2 bg-light schritt-zeile" data-nr="{{ nr }}">
  <div class="row g-2 align-items-end">
    <div class="col-md-1">
      <label class="form-label small text-muted">Schritt</label>
      <input type="text" class="form-control form-control-sm text-center fw-bold"
             value="{{ nr }}" readonly style="background:#e9ecef; max-width:50px;">
    </div>
    <div class="col-md-5">
      <label class="form-label small">Was passiert in diesem Schritt?</label>
      <input type="text" name="schritt_{{ nr }}_beschreibung" class="form-control form-control-sm"
             placeholder="z.B. Vorgesetzter prüft und genehmigt" required>
    </div>
    <div class="col-md-4">
      <label class="form-label small">Wer ist zuständig?</label>
      <input type="text" name="schritt_{{ nr }}_zustaendig" class="form-control form-control-sm"
             placeholder="z.B. Abteilungsleiter, Anna Schmidt">
    </div>
    <div class="col-md-1">
      <label class="form-label small">Frist (Tage)</label>
      <input type="number" name="schritt_{{ nr }}_frist" class="form-control form-control-sm"
             value="3" min="1" max="90">
    </div>
    <div class="col-md-1 text-end">
      <button type="button" class="btn btn-outline-danger btn-sm"
              data-action="schritt-loeschen">&times;</button>
    </div>
  </div>
</div>
