{% extends "base.html" %}

{% block title %}Raumbuch – {% if raum %}Raum bearbeiten{% else %}Neuen Raum anlegen{% endif %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        {% if raum %}Raum bearbeiten: {{ raum.raumnummer }}{% else %}Neuen Raum anlegen{% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_geschoss" class="form-label">Geschoss <span class="text-danger">*</span></label>
                            <select name="geschoss" id="id_geschoss" class="form-select" required>
                                <option value="">-- Bitte wählen --</option>
                                {% for g in geschosse %}
                                <option value="{{ g.pk }}"
                                    {% if raum and raum.geschoss_id == g.pk %}selected{% endif %}>
                                    {{ g }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="id_raumnummer" class="form-label">Raumnummer <span class="text-danger">*</span></label>
                                <input type="text" name="raumnummer" id="id_raumnummer"
                                       class="form-control" required
                                       value="{% if raum %}{{ raum.raumnummer }}{% endif %}"
                                       placeholder="z.B. 1.01">
                            </div>
                            <div class="col-md-8">
                                <label for="id_raumname" class="form-label">Raumname</label>
                                <input type="text" name="raumname" id="id_raumname"
                                       class="form-control"
                                       value="{% if raum %}{{ raum.raumname }}{% endif %}"
                                       placeholder="z.B. Besprechungsraum Ost">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="id_raumtyp" class="form-label">Raumtyp <span class="text-danger">*</span></label>
                                <select name="raumtyp" id="id_raumtyp" class="form-select" required>
                                    <option value="">-- Bitte wählen --</option>
                                    {% for key, label in raumtyp_choices %}
                                    <option value="{{ key }}"
                                        {% if raum and raum.raumtyp == key %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="id_nutzungsmodell" class="form-label">Nutzungsmodell</label>
                                <select name="nutzungsmodell" id="id_nutzungsmodell" class="form-select">
                                    <option value="statisch"
                                        {% if raum and raum.nutzungsmodell == "statisch" %}selected{% endif %}>
                                        Statisch (feste Zuweisung)
                                    </option>
                                    <option value="dynamisch"
                                        {% if raum and raum.nutzungsmodell == "dynamisch" %}selected{% endif %}>
                                        Dynamisch (buchbar)
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="id_kapazitaet" class="form-label">Kapazität (Personen)</label>
                                <input type="number" name="kapazitaet" id="id_kapazitaet"
                                       class="form-control" min="0"
                                       value="{% if raum %}{{ raum.kapazitaet }}{% endif %}">
                            </div>
                            <div class="col-md-4">
                                <label for="id_flaeche" class="form-label">Fläche (m²)</label>
                                <input type="number" name="flaeche" id="id_flaeche"
                                       class="form-control" min="0" step="0.01"
                                       value="{% if raum %}{{ raum.flaeche }}{% endif %}">
                            </div>
                            <div class="col-md-4">
                                <label for="id_bereich" class="form-label">Bereich (optional)</label>
                                <select name="bereich" id="id_bereich" class="form-select">
                                    <option value="">-- Kein Bereich --</option>
                                    {% for b in bereiche %}
                                    <option value="{{ b.pk }}"
                                        {% if raum and raum.bereich_id == b.pk %}selected{% endif %}>
                                        {{ b }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="leer"
                                       id="id_leer"
                                       {% if raum and raum.leer %}checked{% endif %}>
                                <label class="form-check-label" for="id_leer">
                                    Raum steht leer (kein Nutzer zugewiesen)
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="id_beschreibung" class="form-label">Beschreibung / Bemerkungen</label>
                            <textarea name="beschreibung" id="id_beschreibung"
                                      class="form-control" rows="3"
                                      placeholder="Weitere Informationen zum Raum...">{% if raum %}{{ raum.beschreibung }}{% endif %}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                {% if raum %}Änderungen speichern{% else %}Raum anlegen{% endif %}
                            </button>
                            <a href="{% url 'raumbuch:uebersicht' %}" class="btn btn-outline-secondary">
                                Abbrechen
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
